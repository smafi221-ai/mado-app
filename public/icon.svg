<svg xmlns="http://www.w3.org/2000/svg" width="512" height="512" viewBox="0 0 512 512">
  <defs>
    <clipPath id="c">
      <rect width="512" height="512" rx="36"/>
    </clipPath>
  </defs>

  <!-- White base -->
  <rect width="512" height="512" rx="36" fill="white"/>

  <g clip-path="url(#c)">
    <!-- Sky -->
    <rect width="512" height="256" fill="#B8E4F9"/>

    <!-- Ground -->
    <rect y="256" width="512" height="256" fill="#7EC87E"/>

    <!-- Ground highlight near horizon -->
    <rect y="256" width="512" height="36" fill="#9DD89D"/>

    <!-- Cloud 1 (top-left) -->
    <ellipse cx="118" cy="108" rx="52" ry="30" fill="white"/>
    <ellipse cx="148" cy="96"  rx="40" ry="26" fill="white"/>
    <ellipse cx="88"  cy="116" rx="36" ry="22" fill="white"/>
    <ellipse cx="170" cy="112" rx="28" ry="19" fill="white"/>

    <!-- Cloud 2 (top-right) -->
    <ellipse cx="370" cy="140" rx="50" ry="28" fill="white"/>
    <ellipse cx="396" cy="130" rx="37" ry="23" fill="white"/>
    <ellipse cx="347" cy="148" rx="34" ry="20" fill="white"/>
    <ellipse cx="412" cy="145" rx="27" ry="18" fill="white"/>

    <!-- Tree 1 (bottom-left pane) -->
    <rect x="113" y="348" width="16" height="82" rx="3" fill="#7A5C3A"/>
    <ellipse cx="121" cy="332" rx="46" ry="54" fill="#3B8A3B"/>
    <ellipse cx="121" cy="306" rx="36" ry="44" fill="#4CAA4C"/>
    <ellipse cx="100" cy="334" rx="28" ry="34" fill="#4CAA4C"/>
    <ellipse cx="142" cy="332" rx="28" ry="34" fill="#4CAA4C"/>
    <ellipse cx="121" cy="292" rx="24" ry="30" fill="#60BE60"/>

    <!-- Tree 2 (bottom-right pane) -->
    <rect x="383" y="348" width="16" height="82" rx="3" fill="#7A5C3A"/>
    <ellipse cx="391" cy="332" rx="46" ry="54" fill="#3B8A3B"/>
    <ellipse cx="391" cy="306" rx="36" ry="44" fill="#4CAA4C"/>
    <ellipse cx="370" cy="334" rx="28" ry="34" fill="#4CAA4C"/>
    <ellipse cx="412" cy="332" rx="28" ry="34" fill="#4CAA4C"/>
    <ellipse cx="391" cy="292" rx="24" ry="30" fill="#60BE60"/>

    <!-- Window frame: border -->
    <rect x="10" y="10" width="492" height="492" rx="28"
          fill="none" stroke="#2E9E6B" stroke-width="20"/>

    <!-- Window frame: horizontal bar -->
    <rect x="0" y="246" width="512" height="20" fill="#2E9E6B"/>

    <!-- Window frame: vertical bar -->
    <rect x="246" y="0" width="20" height="512" fill="#2E9E6B"/>
  </g>
</svg>
