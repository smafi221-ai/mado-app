<svg xmlns="http://www.w3.org/2000/svg" width="280" height="56" viewBox="0 0 280 56">
  <defs>
    <clipPath id="ic">
      <circle cx="28" cy="28" r="26.5"/>
    </clipPath>
  </defs>

  <!-- Icon base -->
  <circle cx="28" cy="28" r="26.5" fill="#F0FAF5"/>

  <g clip-path="url(#ic)">
    <!-- Sky (top half) -->
    <rect x="0" y="0" width="56" height="28" fill="#D6F0E8"/>
    <!-- Ground (bottom half) -->
    <rect x="0" y="28" width="56" height="28" fill="#A8D9C5"/>

    <!-- Cloud 1 (left) -->
    <ellipse cx="12"   cy="16"   rx="6"   ry="3.5" fill="white"/>
    <ellipse cx="15.5" cy="13.5" rx="4.5" ry="3"   fill="white"/>
    <ellipse cx="9"    cy="17"   rx="3.5" ry="2.2" fill="white"/>

    <!-- Cloud 2 (center) -->
    <ellipse cx="28"   cy="11"   rx="5.5" ry="3.2" fill="white"/>
    <ellipse cx="31.5" cy="8.5"  rx="4"   ry="2.5" fill="white"/>
    <ellipse cx="24.5" cy="12"   rx="3.5" ry="2.2" fill="white"/>

    <!-- Cloud 3 (right) -->
    <ellipse cx="44"   cy="19"   rx="5.5" ry="3"   fill="white"/>
    <ellipse cx="47.5" cy="17"   rx="4"   ry="2.5" fill="white"/>
    <ellipse cx="40.5" cy="20.5" rx="3.5" ry="2"   fill="white"/>

    <!-- Tree 1 (left pane) -->
    <rect    x="13"   y="35"   width="3.5" height="11" rx="1" fill="#5FAD8E"/>
    <ellipse cx="14.75" cy="32"   rx="6"   ry="7"   fill="#2E9E6B"/>
    <ellipse cx="10.5"  cy="34.5" rx="4.5" ry="5"   fill="#2E9E6B"/>
    <ellipse cx="19"    cy="34.5" rx="4.5" ry="5"   fill="#2E9E6B"/>
    <ellipse cx="14.75" cy="27.5" rx="4"   ry="5"   fill="#3DAF7A"/>

    <!-- Tree 2 (right pane) -->
    <rect    x="39.5"  y="35"   width="3.5" height="11" rx="1" fill="#5FAD8E"/>
    <ellipse cx="41.25" cy="32"   rx="6"   ry="7"   fill="#2E9E6B"/>
    <ellipse cx="37"    cy="34.5" rx="4.5" ry="5"   fill="#2E9E6B"/>
    <ellipse cx="45.5"  cy="34.5" rx="4.5" ry="5"   fill="#2E9E6B"/>
    <ellipse cx="41.25" cy="27.5" rx="4"   ry="5"   fill="#3DAF7A"/>

    <!-- Window cross lines -->
    <line x1="0"  y1="28" x2="56" y2="28" stroke="#2E9E6B" stroke-width="2"/>
    <line x1="28" y1="0"  x2="28" y2="56" stroke="#2E9E6B" stroke-width="2"/>
  </g>

  <!-- Outer border -->
  <circle cx="28" cy="28" r="26.5" fill="none" stroke="#2E9E6B" stroke-width="2.5"/>

  <!-- "MaDo" — baseline y=35, cap-top≈y9, visually above icon center(28) -->
  <text
    x="68" y="35"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI',Helvetica,Arial,sans-serif"
    font-size="36"
    font-weight="500"
    fill="#1A6B45"
  >MaDo</text>

  <!-- Catchphrase — baseline y=49, 2px gap below MaDo baseline -->
  <text
    x="68" y="49"
    font-family="system-ui,-apple-system,BlinkMacSystemFont,'Segoe UI','Hiragino Sans',Meiryo,sans-serif"
    font-size="12"
    fill="#5FAD8E"
  >外の世界があなたのそばに</text>
</svg>
